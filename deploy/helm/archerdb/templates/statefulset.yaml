apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "archerdb.fullname" . }}
  labels:
    {{- include "archerdb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "archerdb.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  # Rolling update strategy for zero-downtime upgrades
  # Combined with PDB (minAvailable: 2), ensures quorum during updates
  # To perform canary upgrades, set updateStrategy.rollingUpdate.partition > 0
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      {{- include "archerdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.ports.metrics }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "archerdb.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "archerdb.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.podAntiAffinity.weight }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "archerdb.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: archerdb
          image: {{ include "archerdb.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: client
              containerPort: {{ .Values.ports.client }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: {{ include "archerdb.fullname" . }}-config
          command:
            - /bin/sh
            - -c
            - |
              # Extract replica index from pod name (archerdb-0 -> 0)
              REPLICA_INDEX=${POD_NAME##*-}
              ADDRESSES="{{ include "archerdb.addresses" . }}"
              DATA_FILE="/data/{{ .Values.config.clusterId }}_${REPLICA_INDEX}.archerdb"

              # Format data file if it doesn't exist
              if [ ! -f "$DATA_FILE" ]; then
                archerdb format --cluster={{ .Values.config.clusterId }} --replica=${REPLICA_INDEX} --replica-count={{ .Values.replicaCount }} "$DATA_FILE"
              fi

              # Start the replica
              {{- if .Values.config.development }}
              exec archerdb start --addresses="$ADDRESSES" --development "$DATA_FILE"
              {{- else }}
              exec archerdb start --addresses="$ADDRESSES" "$DATA_FILE"
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: metrics
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: metrics
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "archerdb.labels" . | nindent 10 }}
        annotations:
          helm.sh/resource-policy: keep
      spec:
        accessModes:
          {{- toYaml .Values.storage.accessModes | nindent 10 }}
        {{- if .Values.storage.storageClassName }}
        storageClassName: {{ .Values.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
