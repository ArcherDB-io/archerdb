# ArcherDB Critical-Level Alerting Rules
# These alerts are pager-worthy and require immediate response.
# Route to PagerDuty, OpsGenie, or on-call systems.
#
# All alerts include:
# - runbook_url: Link to troubleshooting documentation
# - remediation: Brief fix suggestion
# - severity: critical (for routing)

groups:
  - name: archerdb-availability-critical
    rules:
      - alert: ArcherDBNodeDown
        expr: up{job="archerdb"} == 0
        for: 1m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "ArcherDB node {{ $labels.instance }} is down"
          description: "Node has been unreachable for >1 minute"
          runbook_url: "https://docs.archerdb.io/runbooks/node-down"
          remediation: "Check node health, restart if necessary, investigate root cause"

      - alert: ArcherDBNodeUnhealthy
        expr: archerdb_health_status >= 2
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "ArcherDB node {{ $labels.instance }} is unhealthy"
          description: "Health status: {{ $value }} (2+ indicates unhealthy)"
          runbook_url: "https://docs.archerdb.io/runbooks/node-unhealthy"
          remediation: "Check /health/detailed endpoint for component-specific issues"

      - alert: ArcherDBNoHealthyNodes
        expr: count(archerdb_health_status == 0) == 0
        for: 1m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "No healthy ArcherDB nodes available"
          description: "All nodes are degraded or unhealthy"
          runbook_url: "https://docs.archerdb.io/runbooks/cluster-down"
          remediation: "CRITICAL: Check all node health immediately, may require emergency restart"

  - name: archerdb-latency-critical
    rules:
      - alert: ArcherDBHighQueryLatencyCritical
        expr: histogram_quantile(0.99, sum(rate(archerdb_read_latency_seconds_bucket[5m])) by (le, instance)) > 2
        for: 5m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Critical query latency on {{ $labels.instance }}"
          description: "p99 query latency is {{ $value | humanizeDuration }} (threshold: 2s)"
          runbook_url: "https://docs.archerdb.io/runbooks/high-query-latency"
          remediation: "Immediate investigation required: check active queries, disk I/O, memory pressure"

      - alert: ArcherDBHighWriteLatencyCritical
        expr: histogram_quantile(0.99, sum(rate(archerdb_write_latency_seconds_bucket[5m])) by (le, instance)) > 2
        for: 5m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Critical write latency on {{ $labels.instance }}"
          description: "p99 write latency is {{ $value | humanizeDuration }} (threshold: 2s)"
          runbook_url: "https://docs.archerdb.io/runbooks/high-write-latency"
          remediation: "Immediate investigation required: check disk I/O, replication, compaction"

  - name: archerdb-replication-critical
    rules:
      - alert: ArcherDBReplicationLagTimeCritical
        expr: max(archerdb_vsr_replication_lag_seconds) by (instance) > 120
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Critical replication lag >2min on {{ $labels.instance }}"
          description: "Current lag: {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.archerdb.io/runbooks/replication-lag"
          remediation: "Immediate investigation: replica may need resync"

      - alert: ArcherDBReplicationLagOpsCritical
        expr: max(archerdb_vsr_replication_lag_ops) by (instance) > 10000
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Critical replication lag >10000 ops on {{ $labels.instance }}"
          description: "Current lag: {{ $value }} operations behind"
          runbook_url: "https://docs.archerdb.io/runbooks/replication-lag"
          remediation: "Immediate investigation: replica may need resync"

      - alert: ArcherDBReplicationSpilloverActive
        expr: archerdb_replication_state == 1
        for: 5m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Replication spillover active on {{ $labels.instance }}"
          description: "S3 upload failures caused disk spillover (state=1)"
          runbook_url: "https://docs.archerdb.io/runbooks/replication-spillover"
          remediation: "Check S3 connectivity, credentials, and spillover directory disk space"

      - alert: ArcherDBReplicationFailed
        expr: archerdb_replication_state == 2
        for: 1m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Replication failed on {{ $labels.instance }}"
          description: "Replication is in failed state (state=2)"
          runbook_url: "https://docs.archerdb.io/runbooks/replication-failed"
          remediation: "CRITICAL: Check replication logs, may require manual intervention"

  - name: archerdb-resource-critical
    rules:
      - alert: ArcherDBHighMemoryUsageCritical
        expr: (archerdb_memory_used_bytes / archerdb_memory_allocated_bytes) * 100 > 85
        for: 5m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Memory usage >85% on {{ $labels.instance }}"
          description: "Current usage: {{ $value | humanize }}%"
          runbook_url: "https://docs.archerdb.io/runbooks/memory-pressure"
          remediation: "Immediate action: reduce workload or increase memory allocation"

      - alert: ArcherDBHighIndexLoadFactorCritical
        expr: archerdb_index_load_factor > 0.9
        for: 5m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Index load factor >90% on {{ $labels.instance }}"
          description: "Current load factor: {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.archerdb.io/runbooks/index-pressure"
          remediation: "Immediate action: scale cluster or risk query failures"

  - name: archerdb-error-critical
    rules:
      - alert: ArcherDBErrorRateCritical
        expr: sum(rate(archerdb_write_errors_total[5m])) by (instance) > 1
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "High write error rate on {{ $labels.instance }}"
          description: "Error rate: {{ $value | humanize }}/sec"
          runbook_url: "https://docs.archerdb.io/runbooks/write-errors"
          remediation: "Immediate investigation: check disk health and error logs"

      - alert: ArcherDBHighTombstoneRatio
        expr: archerdb_tombstone_ratio > 0.3
        for: 10m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "High tombstone ratio on {{ $labels.instance }}"
          description: "Tombstone ratio: {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.archerdb.io/runbooks/tombstone-buildup"
          remediation: "Check for delete-heavy workloads, force compaction if needed"

  - name: archerdb-cluster-critical
    rules:
      - alert: ArcherDBUnhealthyShards
        expr: (archerdb_coordinator_shards_healthy / archerdb_coordinator_shards_total) < 0.75
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Less than 75% of shards healthy"
          description: "Healthy: {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.archerdb.io/runbooks/unhealthy-shards"
          remediation: "Check individual shard nodes, network connectivity, and cluster state"

      - alert: ArcherDBCoordinatorQueryFailures
        expr: rate(archerdb_coordinator_query_errors_total[5m]) > 1
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "High coordinator query failure rate"
          description: "Error rate: {{ $value | humanize }}/sec"
          runbook_url: "https://docs.archerdb.io/runbooks/coordinator-errors"
          remediation: "Check shard connectivity and coordinator logs"

  - name: archerdb-compaction-critical
    rules:
      - alert: ArcherDBHighWriteAmplificationCritical
        expr: archerdb_lsm_write_amplification_ratio > 30
        for: 10m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Critical write amplification on {{ $labels.instance }}"
          description: "Current write amplification: {{ $value }}x (threshold: 30x)"
          runbook_url: "https://docs.archerdb.io/runbooks/write-amplification"
          remediation: "Severe compaction pressure, consider emergency tuning or load reduction"

      - alert: ArcherDBCompactionStalled
        expr: increase(archerdb_compaction_total[30m]) == 0 and archerdb_lsm_tables_count{level="0"} > 2
        for: 15m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Compaction appears stalled on {{ $labels.instance }}"
          description: "No compactions in 30 minutes with {{ $value }} L0 tables"
          runbook_url: "https://docs.archerdb.io/runbooks/compaction-stalled"
          remediation: "Check for compaction errors, disk space, or resource exhaustion"
