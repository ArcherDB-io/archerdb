# ArcherDB Competitor Benchmark Infrastructure
#
# Provides containerized instances of competing geospatial databases
# with both default and tuned configurations for fair comparison.
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d postgis      # Start specific service
#   docker compose down -v            # Stop and remove volumes

version: "3.9"

services:
  # PostGIS - PostgreSQL with PostGIS extension (BENCH-03)
  # Tuned for geospatial workloads with increased shared buffers
  postgis:
    image: postgis/postgis:15-3.4
    container_name: bench-postgis
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: geobench
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - work_mem=256MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=64MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - max_parallel_workers_per_gather=4
      - -c
      - max_parallel_workers=8
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d geobench"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgis_data:/var/lib/postgresql/data

  # PostGIS Default Configuration (for comparison)
  postgis-default:
    image: postgis/postgis:15-3.4
    container_name: bench-postgis-default
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: geobench
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d geobench"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgis_default_data:/var/lib/postgresql/data

  # Tile38 - Geospatial database (BENCH-04)
  # Tile38 is optimized by default, no significant tuning needed
  tile38:
    image: tile38/tile38:latest
    container_name: bench-tile38
    ports:
      - "9851:9851"
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "tile38-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - tile38_data:/data

  # Elasticsearch with Geo capabilities (BENCH-05)
  # Tuned with increased heap and geo-optimized settings
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: bench-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - bootstrap.memory_lock=true
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # Elasticsearch Default Configuration (for comparison)
  elasticsearch-default:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: bench-elasticsearch-default
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9201:9200"
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - elasticsearch_default_data:/usr/share/elasticsearch/data

  # Aerospike with Geospatial support (BENCH-06)
  # Configured with geospatial index support
  aerospike:
    image: aerospike/aerospike-server:latest
    container_name: bench-aerospike
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - aerospike_data:/opt/aerospike/data
      - ./aerospike.conf:/etc/aerospike/aerospike.conf:ro
    command: ["--config-file", "/etc/aerospike/aerospike.conf"]

volumes:
  postgis_data:
  postgis_default_data:
  tile38_data:
  elasticsearch_data:
  elasticsearch_default_data:
  aerospike_data:

networks:
  default:
    name: bench-network
