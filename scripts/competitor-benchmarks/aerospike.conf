# Aerospike configuration for geospatial benchmarks
# Tuned for high-throughput geospatial operations

service {
    user root
    group root
    paxos-single-replica-limit 1
    pidfile /var/run/aerospike/asd.pid
    proto-fd-max 15000
}

logging {
    file /var/log/aerospike/aerospike.log {
        context any info
    }
}

network {
    service {
        address any
        port 3000
    }

    heartbeat {
        mode mesh
        port 3002
        interval 150
        timeout 10
    }

    fabric {
        port 3001
    }

    info {
        port 3003
    }
}

namespace geobench {
    replication-factor 1
    memory-size 4G
    default-ttl 0

    # Enable geospatial index support
    geo2dsphere-within-strict true
    geo2dsphere-within-min-level 1
    geo2dsphere-within-max-level 20
    geo2dsphere-within-max-cells 12
    geo2dsphere-within-level-mod 1

    storage-engine memory

    # High-performance index settings
    index-type shmem {
        mounts /opt/aerospike/data
        data-size 2G
    }
}
