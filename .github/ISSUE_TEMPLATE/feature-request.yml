name: Feature request
description: Propose a new capability or a change to existing behavior.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or operator problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should ArcherDB do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds, rejected approaches, or competing designs.
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: How should correctness, compatibility, and performance be verified?
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first.
          required: true
        - label: I am willing to help validate or implement this change.
          required: false
