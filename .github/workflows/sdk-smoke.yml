# SDK Smoke Tests - All 5 SDKs with JUnit XML reporting
# Budget includes Zig bootstrap, lite build, server startup, and SDK smoke.
# Runs on every push and pull request.

name: SDK Smoke Tests
on: [push, pull_request]

permissions:
  contents: read
  checks: write

concurrency:
  group: sdk-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: true  # Per CONTEXT.md decision
      matrix:
        sdk: [python, nodejs, go, java, c]
    name: Smoke (${{ matrix.sdk }})
    steps:
      - uses: actions/checkout@v6

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB (lite config)
        run: ./zig/zig build -j4 -Dconfig=lite

      - name: Build Python native client artifacts
        if: matrix.sdk == 'python'
        run: ./zig/zig build -j4 -Dconfig=lite clients:python

      - name: Start single-node server
        run: |
          TMPDIR=$(mktemp -d)
          ./zig-out/bin/archerdb format --cluster=0 --replica=0 --replica-count=1 "$TMPDIR/test.archerdb"
          ./zig-out/bin/archerdb start --addresses=127.0.0.1:3000 --metrics-port=9100 --metrics-bind=127.0.0.1 "$TMPDIR/test.archerdb" > server.log 2>&1 &
          echo $! > server.pid
          # Wait for both readiness and the data-plane listener log line.
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:9100/health/ready >/dev/null 2>&1 && \
               grep -q 'listening on 127.0.0.1:3000' server.log; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 "$(cat server.pid)" 2>/dev/null; then
              echo "Server exited during startup"
              cat server.log || true
              exit 1
            fi
            sleep 1
          done
          if ! curl -sf http://127.0.0.1:9100/health/ready >/dev/null 2>&1 || \
             ! grep -q 'listening on 127.0.0.1:3000' server.log; then
            echo "Server did not become ready in time"
            tail -n 200 server.log || true
            exit 1
          fi

      - name: Create test-results directory
        run: mkdir -p test-results

      # Python smoke test with JUnit XML
      - uses: actions/setup-python@v6
        if: matrix.sdk == 'python'
        with:
          python-version: '3.11'

      - name: Python smoke
        if: matrix.sdk == 'python'
        env:
          ARCHERDB_ADDRESS: 127.0.0.1:3000
          PYTHONPATH: src/clients/python/src
        run: |
          set +e
          python - <<'PYTEST'
          import os
          import sys
          import time

          from archerdb import GeoClientSync, GeoClientConfig, create_geo_event, id as archerdb_id

          address = os.environ["ARCHERDB_ADDRESS"]

          def wait_until(description, fn, timeout_s=30.0, interval_s=0.5):
              deadline = time.monotonic() + timeout_s
              while time.monotonic() < deadline:
                  value = fn()
                  if value:
                      return value
                  time.sleep(interval_s)
              raise AssertionError(f"{description} did not become true within {timeout_s:.1f}s")

          def run_smoke_attempt(attempt: int):
              client = GeoClientSync(
                  GeoClientConfig(
                      cluster_id=0,
                      addresses=[address],
                      request_timeout_ms=10000,
                  )
              )
              try:
                  entity_id = archerdb_id()
                  event = create_geo_event(
                      entity_id=entity_id,
                      latitude=37.7749,
                      longitude=-122.4194,
                      ttl_seconds=60,
                  )

                  errors = client.insert_events([event])
                  assert errors == []

                  found = wait_until(
                      f"latest lookup attempt {attempt}",
                      lambda: (evt := client.get_latest_by_uuid(entity_id))
                      and evt.entity_id == entity_id and evt,
                  )
                  assert found.entity_id == entity_id

                  radius_result = wait_until(
                      f"radius query visibility attempt {attempt}",
                      lambda: (result := client.query_radius(
                          latitude=37.7749,
                          longitude=-122.4194,
                          radius_m=2000,
                          limit=5,
                      )) and next(
                          (evt for evt in result.events if evt.entity_id == entity_id),
                          None,
                      ),
                      timeout_s=45.0,
                      interval_s=1.0,
                  )
                  assert radius_result.entity_id == entity_id

              finally:
                  client.close()

          for attempt in (1, 2):
              try:
                  run_smoke_attempt(attempt)
                  break
              except Exception as exc:
                  print(f"Python smoke attempt {attempt} failed: {exc}", file=sys.stderr)
                  if attempt == 2:
                      raise
                  time.sleep(2.0)
          PYTEST
          status=$?
          if [ "$status" -eq 0 ]; then
            cat > test-results/python.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="python-sdk" tests="1" failures="0"><testcase name="python-sdk-smoke" classname="python-sdk"/></testsuite></testsuites>
          EOF
          else
            cat > test-results/python.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="python-sdk" tests="1" failures="1"><testcase name="python-sdk-smoke" classname="python-sdk"><failure message="Python SDK smoke tests failed">See workflow logs for details.</failure></testcase></testsuite></testsuites>
          EOF
          fi
          exit "$status"

      - name: Show server log on failure
        if: failure() || cancelled()
        run: tail -n 200 server.log || true

      # Node.js smoke test with JUnit XML
      - uses: actions/setup-node@v6
        if: matrix.sdk == 'nodejs'
        with:
          node-version: '20'

      - name: Node.js smoke
        if: matrix.sdk == 'nodejs'
        run: |
          cd src/clients/node
          npm install
          set +e
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 npm test
          status=$?
          cd ../../..
          if [ "$status" -eq 0 ]; then
            cat > test-results/nodejs.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="nodejs-sdk" tests="1" failures="0"><testcase name="nodejs-sdk-smoke" classname="nodejs-sdk"/></testsuite></testsuites>
          EOF
          else
            cat > test-results/nodejs.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="nodejs-sdk" tests="1" failures="1"><testcase name="nodejs-sdk-smoke" classname="nodejs-sdk"><failure message="Node.js SDK smoke tests failed">See workflow logs for details.</failure></testcase></testsuite></testsuites>
          EOF
          fi
          exit "$status"
      # Go smoke test with JUnit XML
      - uses: actions/setup-go@v6
        if: matrix.sdk == 'go'
        with:
          go-version: '1.21'
          cache: false

      - name: Build Go native client artifacts
        if: matrix.sdk == 'go'
        run: ./zig/zig build clients:go

      - name: Go smoke
        if: matrix.sdk == 'go'
        run: |
          export CC="$PWD/zig/zig cc"
          cd src/clients/go
          go install github.com/jstemmer/go-junit-report/v2@latest
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 \
          go test ./... -v -timeout 30s 2>&1 | go-junit-report > ../../../test-results/go.xml || true

      # Java smoke test with JUnit XML
      - uses: actions/setup-java@v5
        if: matrix.sdk == 'java'
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Java smoke
        if: matrix.sdk == 'java'
        run: |
          cd src/clients/java
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 mvn test -q -Dsurefire.reportFormat=xml || true
          cp target/surefire-reports/*.xml ../../../test-results/ 2>/dev/null || echo "No Java results"

      # C smoke test with JUnit XML
      - name: C smoke
        if: matrix.sdk == 'c'
        env:
          ARCHERDB_ADDRESS: 127.0.0.1:3000
          TEST_TAG: smoke
        run: |
          ./zig/zig build clients:c
          set +e
          (
            cd tests/sdk_tests/c
            ../../../zig/zig build test -Doptimize=ReleaseSafe
          )
          status=$?
          if [ "$status" -eq 0 ]; then
            cat > test-results/c.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="c-sdk" tests="1" failures="0"><testcase name="c-sdk-smoke" classname="c-sdk"/></testsuite></testsuites>
          EOF
          else
            cat > test-results/c.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="c-sdk" tests="1" failures="1"><testcase name="c-sdk-smoke" classname="c-sdk"><failure message="C SDK smoke tests failed">See workflow logs for details.</failure></testcase></testsuite></testsuites>
          EOF
          fi
          exit "$status"

      # Publish JUnit XML test results
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'test-results/*.xml'
          check_name: 'Smoke Tests (${{ matrix.sdk }})'
          fail_on_failure: true
          include_passed: true

      # Upload test results artifact
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-test-results-${{ matrix.sdk }}
          path: test-results/
          retention-days: 30

      - name: Upload server log on failure
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: smoke-server-log-${{ matrix.sdk }}
          path: server.log
          retention-days: 14

      - name: Cleanup
        if: always()
        run: kill $(cat server.pid) 2>/dev/null || true
