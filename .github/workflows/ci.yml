name: CI
permissions:
  contents: read  # Required for actions/checkout

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  # Smoke test - fast feedback on common issues
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tidy blob checks

      # Shell script validation
      - name: Check shell scripts
        run: shellcheck ./zig/download.sh

      # Download Zig
      - name: Download Zig
        run: ./zig/download.sh && ./zig/zig version

      # Code formatting and tidy checks
      - name: Run tidy checks
        run: ./zig/zig build test -- tidy

      # Quick build verification
      - name: Quick build
        run: ./zig/zig build

  # Core test suite across platforms
  test:
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: 'ubuntu-latest', name: 'Linux x64' }
          - { os: 'macos-latest', name: 'macOS ARM64' }
          # Windows and ARM runners added back when available
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.name }})
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tidy blob checks in test:unit

      # Download Zig (platform-specific)
      - name: Download Zig
        shell: bash
        run: ./zig/download.sh

      - name: Verify Zig version
        shell: bash
        run: ./zig/zig version

      # Run unit tests
      - name: Run unit tests
        shell: bash
        run: ./zig/zig build test:unit

      # Build ArcherDB
      - name: Build ArcherDB
        shell: bash
        run: ./zig/zig build --release=safe

      # Verify build
      - name: Verify binary
        shell: bash
        run: ./zig-out/bin/archerdb version --verbose

  # Build reproducibility check
  reproducible-build:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./zig/download.sh

      # Build twice and compare hashes
      - name: First build
        run: |
          ./zig/zig build --release=safe
          sha256sum ./zig-out/bin/archerdb > build1.sha256

      - name: Clean and rebuild
        run: |
          rm -rf ./zig-out ./.zig-cache
          ./zig/zig build --release=safe
          sha256sum ./zig-out/bin/archerdb > build2.sha256

      - name: Compare builds
        run: |
          echo "Build 1:" && cat build1.sha256
          echo "Build 2:" && cat build2.sha256
          diff build1.sha256 build2.sha256 && echo "✓ Builds are reproducible!"

  # Core status check - aggregates required checks
  core:
    needs: [smoke, test, reproducible-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.smoke.result }}" != "success" ]]; then
            echo "Smoke job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed"
            exit 1
          fi
          if [[ "${{ needs.reproducible-build.result }}" != "success" ]]; then
            echo "Reproducible build job failed"
            exit 1
          fi
          echo "✓ All core checks passed!"
