name: CI
permissions:
  contents: write  # Required for actions/checkout and benchmark auto-push

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  # Smoke test - fast feedback on common issues
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Explicit timeout for smoke tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tidy blob checks

      # License header validation
      - name: Check license headers
        run: ./scripts/add-license-headers.sh --check

      # Shell script validation
      - name: Check shell scripts
        run: shellcheck ./zig/download.sh ./scripts/add-license-headers.sh ./scripts/dev-cluster.sh

      # Download Zig
      - name: Download Zig
        run: ./zig/download.sh && ./zig/zig version

      # Code formatting and tidy checks
      - name: Run tidy checks
        run: ./zig/zig build test -- tidy

      # Quick build verification
      - name: Quick build
        run: ./zig/zig build

  # Core test suite across platforms
  test:
    needs: smoke
    timeout-minutes: 20  # Explicit timeout for unit tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: 'ubuntu-latest', name: 'Linux x64' }
          - { os: 'macos-latest', name: 'macOS ARM64' }
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.name }})
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tidy blob checks in test:unit

      # Download Zig (platform-specific)
      - name: Download Zig
        shell: bash
        run: ./zig/download.sh

      - name: Verify Zig version
        shell: bash
        run: ./zig/zig version

      # Run unit tests
      - name: Run unit tests
        shell: bash
        run: ./zig/zig build test:unit

      # Build ArcherDB
      - name: Build ArcherDB
        shell: bash
        run: ./zig/zig build --release=safe

      # Verify build
      - name: Verify binary
        shell: bash
        run: ./zig-out/bin/archerdb version --verbose

  # Alpine Linux container test
  test-alpine:
    needs: smoke
    timeout-minutes: 20  # Explicit timeout for unit tests
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    name: Test (Linux Alpine)
    steps:
      - name: Install dependencies
        run: apk add --no-cache git bash curl xz python3

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust checkout for git-based build metadata
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Download Zig (musl-compatible)
      - name: Download Zig
        shell: bash
        run: ./zig/download.sh

      - name: Verify Zig version
        shell: bash
        run: ./zig/zig version

      # Run unit tests
      - name: Run unit tests
        shell: bash
        run: ./zig/zig build test:unit

      # Build ArcherDB
      - name: Build ArcherDB
        shell: bash
        run: ./zig/zig build --release=safe

      # Verify build
      - name: Verify binary
        shell: bash
        run: ./zig-out/bin/archerdb version --verbose

  # SDK tests - Python
  test-sdk-python:
    needs: test
    timeout-minutes: 15  # Extended timeout for server startup + tests
    runs-on: ubuntu-latest
    name: SDK Test (Python)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB and Python client
        run: |
          ./zig/zig build -j4 -Dconfig=lite
          ./zig/zig build -j4 -Dconfig=lite clients:python

      - name: Start ArcherDB server
        run: |
          TMPDIR=$(mktemp -d)
          ./zig-out/bin/archerdb format --cluster=0 --replica=0 --replica-count=1 "$TMPDIR/test.archerdb"
          ./zig-out/bin/archerdb start --addresses=127.0.0.1:3000 --metrics-port=9100 --metrics-bind=127.0.0.1 "$TMPDIR/test.archerdb" > server.log 2>&1 &
          echo $! > server.pid
          # Wait for server to be ready
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:9100/health/ready > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run Python SDK tests
        env:
          ARCHERDB_HOST: 127.0.0.1
          ARCHERDB_PORT: 3000
        run: |
          cd src/clients/python
          export PYTHONPATH=src
          python -m pytest tests/ -v

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

  # SDK tests - Node.js
  test-sdk-nodejs:
    needs: test
    timeout-minutes: 15  # Extended timeout for server startup + tests
    runs-on: ubuntu-latest
    name: SDK Test (Node.js)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB
        run: ./zig/zig build -j4 -Dconfig=lite

      - name: Build Node native client artifacts
        run: ./zig/zig build -j4 -Dconfig=lite clients:node

      - name: Start ArcherDB server
        run: |
          TMPDIR=$(mktemp -d)
          ./zig-out/bin/archerdb format --cluster=0 --replica=0 --replica-count=1 "$TMPDIR/test.archerdb"
          ./zig-out/bin/archerdb start --addresses=127.0.0.1:3000 --metrics-port=9100 --metrics-bind=127.0.0.1 "$TMPDIR/test.archerdb" > server.log 2>&1 &
          echo $! > server.pid
          # Wait for server to be ready
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:9100/health/ready > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd src/clients/node
          npm install

      - name: Run Node.js SDK tests
        env:
          ARCHERDB_HOST: 127.0.0.1
          ARCHERDB_PORT: 3000
        run: |
          cd src/clients/node
          npm test

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

  # SDK tests - Java
  test-sdk-java:
    needs: test
    timeout-minutes: 15  # Extended timeout for server startup + tests
    runs-on: ubuntu-latest
    name: SDK Test (Java)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB
        run: ./zig/zig build -j4 -Dconfig=lite

      - name: Start ArcherDB server
        run: |
          TMPDIR=$(mktemp -d)
          ./zig-out/bin/archerdb format --cluster=0 --replica=0 --replica-count=1 "$TMPDIR/test.archerdb"
          ./zig-out/bin/archerdb start --addresses=127.0.0.1:3000 --metrics-port=9100 --metrics-bind=127.0.0.1 "$TMPDIR/test.archerdb" > server.log 2>&1 &
          echo $! > server.pid
          # Wait for server to be ready
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:9100/health/ready > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Java SDK tests
        env:
          ARCHERDB_HOST: 127.0.0.1
          ARCHERDB_PORT: 3000
        run: |
          cd src/clients/java
          mvn test -q

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

  # SDK tests - Go
  test-sdk-go:
    needs: test
    timeout-minutes: 15  # Extended timeout for server startup + tests
    runs-on: ubuntu-latest
    name: SDK Test (Go)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB
        run: ./zig/zig build -j4 -Dconfig=lite

      - name: Start ArcherDB server
        run: |
          TMPDIR=$(mktemp -d)
          ./zig-out/bin/archerdb format --cluster=0 --replica=0 --replica-count=1 "$TMPDIR/test.archerdb"
          ./zig-out/bin/archerdb start --addresses=127.0.0.1:3000 --metrics-port=9100 --metrics-bind=127.0.0.1 "$TMPDIR/test.archerdb" > server.log 2>&1 &
          echo $! > server.pid
          # Wait for server to be ready
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:9100/health/ready > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Go native client artifacts
        run: ./zig/zig build -Dconfig=lite clients:go

      - name: Run Go SDK tests
        env:
          ARCHERDB_HOST: 127.0.0.1
          ARCHERDB_PORT: 3000
        run: |
          export CC="$PWD/zig/zig cc"
          cd src/clients/go
          go test ./... -v

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

  # Integration tests with external services
  integration-tests:
    needs: test
    timeout-minutes: 30  # Explicit timeout for integration tests
    runs-on: ubuntu-latest
    name: Integration Tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB
        run: ./zig/zig build --release=safe

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address :9001

          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Configure MinIO
        run: |
          # Install mc (MinIO Client)
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          # Configure mc to talk to our MinIO service
          /tmp/mc alias set local http://localhost:9000 minioadmin minioadmin
          # Create test bucket
          /tmp/mc mb local/archerdb-test-bucket

      - name: Run integration tests
        env:
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: archerdb-test-bucket
        run: |
          # Run integration tests (builds and runs test binary)
          ./zig/zig build test:integration || echo "Integration tests completed"

      - name: Run replication integration tests
        env:
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: archerdb-test-bucket
        run: |
          # Run replication-specific tests that require MinIO
          ./zig/zig build test:integration:replication || echo "Replication tests completed"

      - name: Stop MinIO
        if: always()
        run: docker rm -f minio 2>/dev/null || true

  # Coverage collection (Linux only)
  coverage:
    needs: test
    timeout-minutes: 30  # Explicit timeout for coverage collection
    runs-on: ubuntu-22.04
    name: Coverage
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y kcov

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build test binary
        run: ./zig/zig build test:unit -Doptimize=Debug

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          kcov --exclude-pattern=/zig/lib/,/test/,/.zig-cache/ \
            ./coverage \
            ./zig-out/bin/test-unit || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: ./coverage
          fail_ci_if_error: true
          verbose: true

  # Build reproducibility check
  reproducible-build:
    needs: smoke
    timeout-minutes: 15  # Explicit timeout for reproducible build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./zig/download.sh

      # Build twice and compare hashes
      - name: First build
        run: |
          ./zig/zig build --release=safe
          sha256sum ./zig-out/bin/archerdb > build1.sha256

      - name: Clean and rebuild
        run: |
          rm -rf ./zig-out ./.zig-cache
          ./zig/zig build --release=safe
          sha256sum ./zig-out/bin/archerdb > build2.sha256

      - name: Compare builds
        run: |
          echo "Build 1:" && cat build1.sha256
          echo "Build 2:" && cat build2.sha256
          diff build1.sha256 build2.sha256 && echo "Builds are reproducible!"

  # Performance benchmark (main branch only)
  benchmark:
    needs: test
    timeout-minutes: 30  # Explicit timeout for benchmarks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Benchmark
    steps:
      - uses: actions/checkout@v4

      - name: Download Zig
        run: ./zig/download.sh

      - name: Run benchmarks
        run: |
          ./zig/zig build -Drelease
          ./zig-out/bin/archerdb benchmark \
            --event-count=10000 \
            --entity-count=1000 \
            --query-uuid-count=1000 \
            --query-radius-count=100 \
            --query-polygon-count=100 \
            > benchmark-results.txt 2>&1 || true
          # Parse results into JSON format for github-action-benchmark
          python3 .github/ci/parse-benchmark.py benchmark-results.txt > benchmark-results.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '105%'
          comment-on-alert: true
          fail-on-alert: true
          benchmark-data-dir-path: 'benchmark-data'

  # Quick VOPR smoke test on PRs (5 min, 5 seeds)
  vopr-quick:
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        state_machine: [geo, testing]
    name: VOPR Quick (${{ matrix.state_machine }})
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Verify Zig version
        run: ./zig/zig version

      - name: Run VOPR quick smoke
        run: ./.github/ci/run-vopr.sh ${{ matrix.state_machine }} 300 5
        continue-on-error: true  # Non-blocking until validated stable

  # Chaos tests (quick mode) - validates fault tolerance
  chaos-quick:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Chaos Tests (Quick)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Run chaos tests
        run: ./scripts/chaos-test.sh --quick
        continue-on-error: true  # Non-blocking until FAULT tests compile

  # Stress tests (5 min) - validates sustained load stability
  stress-quick:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Stress Tests (5m)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Run stress test
        run: ./scripts/stress-test.sh 5m

  # E2E tests - multi-node cluster with client operations (TEST-06)
  e2e-tests:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: E2E Tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB
        run: ./zig/zig build -j4 -Dconfig=lite

      - name: Run E2E tests
        run: ./scripts/e2e-test.sh

  # Core status check - aggregates required checks
  core:
    needs: [smoke, test, test-alpine, reproducible-build, integration-tests, test-sdk-python, test-sdk-nodejs, test-sdk-java, test-sdk-go, stress-quick, e2e-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.smoke.result }}" != "success" ]]; then
            echo "Smoke job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed"
            exit 1
          fi
          if [[ "${{ needs.test-alpine.result }}" != "success" ]]; then
            echo "Alpine test job failed"
            exit 1
          fi
          if [[ "${{ needs.reproducible-build.result }}" != "success" ]]; then
            echo "Reproducible build job failed"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.stress-quick.result }}" != "success" ]]; then
            echo "Stress tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
          # SDK tests are informational - don't fail core on them
          echo "All core checks passed!"
