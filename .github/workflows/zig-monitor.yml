name: Zig Release Monitor

on:
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-releases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current pinned Zig version
        id: current
        run: |
          CURRENT=$(grep 'ZIG_RELEASE=' zig/download.sh | head -1 | cut -d'"' -f2)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current pinned Zig: $CURRENT"

      - name: Check latest Zig release
        id: latest-zig
        run: |
          LATEST=$(curl -s https://ziglang.org/download/index.json | jq -r 'keys | map(select(. != "master")) | sort | last')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Zig release: $LATEST"

      - name: Check ArcherDB Zig version
        id: archerdb
        run: |
          TB_ZIG=$(curl -s https://raw.githubusercontent.com/archerdb/archerdb/main/zig/download.sh | grep 'ZIG_RELEASE=' | head -1 | cut -d'"' -f2)
          echo "version=$TB_ZIG" >> "$GITHUB_OUTPUT"
          echo "ArcherDB Zig version: $TB_ZIG"

      - name: Compare versions
        env:
          CURRENT: ${{ steps.current.outputs.version }}
          LATEST_ZIG: ${{ steps.latest-zig.outputs.version }}
          TB_ZIG: ${{ steps.archerdb.outputs.version }}
        run: |
          echo "=== Zig Version Report ==="
          echo "ArcherDB pinned: $CURRENT"
          echo "ArcherDB uses: $TB_ZIG"
          echo "Latest Zig release: $LATEST_ZIG"
          echo ""

          if [ "$CURRENT" != "$TB_ZIG" ]; then
            echo "WARNING: ArcherDB updated to Zig $TB_ZIG"
            echo "ACTION REQUIRED: Update zig/download.sh to match ArcherDB"
          fi

          if [ "$CURRENT" != "$LATEST_ZIG" ]; then
            echo "INFO: Newer Zig version available: $LATEST_ZIG"
            echo "(Wait for ArcherDB to upgrade before updating ArcherDB)"
          fi

      - name: Create issue if ArcherDB updated
        if: steps.archerdb.outputs.version != steps.current.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          TB_ZIG: ${{ steps.archerdb.outputs.version }}
          CURRENT: ${{ steps.current.outputs.version }}
        run: |
          # Check if issue already exists
          EXISTING=$(gh issue list --label "zig-update" --state open --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh issue create \
              --title "Zig version update: $CURRENT -> $TB_ZIG" \
              --label "zig-update" \
              --body "ArcherDB has updated their Zig version from $CURRENT to $TB_ZIG.

          ## Action Required
          1. Update zig/download.sh to use Zig $TB_ZIG
          2. Run ecosystem validation tests
          3. Verify all builds pass

          ## References
          - ArcherDB download.sh: https://github.com/archerdb/archerdb/blob/main/zig/download.sh
          - Zig releases: https://ziglang.org/download/

          This issue was automatically created by the Zig Release Monitor workflow."
          fi
