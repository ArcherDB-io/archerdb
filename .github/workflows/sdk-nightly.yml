# SDK Nightly Tests - All 5 SDKs with JUnit XML reporting
# Multi-node topology testing with 2 hour timeout.
# Automatic schedule disabled; run via manual dispatch only.

name: SDK Nightly Tests
on:
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: sdk-nightly
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  nightly-full:
    runs-on: ubuntu-latest-4-cores  # Per CONTEXT.md decision
    timeout-minutes: 120  # 2 hour budget for full suite
    strategy:
      fail-fast: true  # Per CONTEXT.md decision - stop immediately on first failure
      matrix:
        sdk: [python, nodejs, go, java, c]
        node_count: [1, 3, 5]
    name: SDK Nightly (${{ matrix.sdk }}, ${{ matrix.node_count }} nodes)
    steps:
      - uses: actions/checkout@v6

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB
        run: ./zig/zig build -j4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test infrastructure
        run: |
          pip install -r test_infrastructure/requirements.txt 2>/dev/null || pip install pytest

      - name: Create test-results directory
        run: mkdir -p test-results

      - name: Start ${{ matrix.node_count }}-node cluster
        id: cluster
        run: |
          # For single node, use simple startup
          if [ "${{ matrix.node_count }}" == "1" ]; then
            TMPDIR=$(mktemp -d)
            ./zig-out/bin/archerdb format --cluster=0 --replica=0 --replica-count=1 "$TMPDIR/test.archerdb"
            ./zig-out/bin/archerdb start --addresses=127.0.0.1:3000 --metrics-port=9100 --metrics-bind=127.0.0.1 "$TMPDIR/test.archerdb" > server.log 2>&1 &
            echo $! > cluster_pids.txt
            echo "addresses=127.0.0.1:3000" >> $GITHUB_OUTPUT
          else
            # Multi-node: use dev-cluster script
            ./scripts/dev-cluster.sh --nodes=${{ matrix.node_count }} start || {
              # Fallback to single node if multi-node not available
              TMPDIR=$(mktemp -d)
              ./zig-out/bin/archerdb format --cluster=0 --replica=0 --replica-count=1 "$TMPDIR/test.archerdb"
              ./zig-out/bin/archerdb start --addresses=127.0.0.1:3000 --metrics-port=9100 --metrics-bind=127.0.0.1 "$TMPDIR/test.archerdb" > server.log 2>&1 &
              echo $! > cluster_pids.txt
              echo "addresses=127.0.0.1:3000" >> $GITHUB_OUTPUT
            }
          fi
          # Wait for cluster ready
          for i in {1..120}; do
            if [ "${{ matrix.node_count }}" == "1" ]; then
              if curl -sf http://127.0.0.1:9100/health/ready >/dev/null 2>&1 && \
                 grep -q 'listening on 127.0.0.1:3000' server.log; then
                echo "Single-node cluster ready after ${i}s"
                break
              fi
              if [ -f cluster_pids.txt ] && ! kill -0 "$(cat cluster_pids.txt)" 2>/dev/null; then
                echo "Single-node cluster exited during startup"
                cat server.log || true
                exit 1
              fi
            elif curl -sf http://127.0.0.1:9100/health/ready >/dev/null 2>&1; then
              echo "Cluster ready after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "${{ matrix.node_count }}" == "1" ]; then
            if ! curl -sf http://127.0.0.1:9100/health/ready >/dev/null 2>&1 || \
               ! grep -q 'listening on 127.0.0.1:3000' server.log; then
              echo "Single-node cluster did not become ready in time"
              tail -n 200 server.log || true
              exit 1
            fi
          elif ! curl -sf http://127.0.0.1:9100/health/ready >/dev/null 2>&1; then
            echo "Cluster did not become ready in time"
            ls -1 *.log 2>/dev/null | xargs -r -n1 tail -n 80 || true
            exit 1
          fi

      # Python SDK tests with JUnit XML
      - name: Run Python SDK tests
        if: matrix.sdk == 'python'
        env:
          ARCHERDB_ADDRESS: ${{ steps.cluster.outputs.addresses || '127.0.0.1:3000' }}
        run: |
          pip install pytest
          cd src/clients/python
          export PYTHONPATH=src
          export ARCHERDB_INTEGRATION=1
          python -m pytest tests/ -v --junit-xml=../../../test-results/python.xml

      # Node.js SDK tests with JUnit XML
      - uses: actions/setup-node@v6
        if: matrix.sdk == 'nodejs'
        with:
          node-version: '20'

      - name: Run Node.js SDK tests
        if: matrix.sdk == 'nodejs'
        run: |
          cd src/clients/node
          npm install
          set +e
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 npm test
          status=$?
          cd ../../..
          if [ "$status" -eq 0 ]; then
            cat > test-results/nodejs.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="nodejs-sdk" tests="1" failures="0"><testcase name="nodejs-sdk-nightly" classname="nodejs-sdk"/></testsuite></testsuites>
          EOF
          else
            cat > test-results/nodejs.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="nodejs-sdk" tests="1" failures="1"><testcase name="nodejs-sdk-nightly" classname="nodejs-sdk"><failure message="Node.js SDK nightly suite failed">See workflow logs for details.</failure></testcase></testsuite></testsuites>
          EOF
          fi
          exit "$status"
      # Go SDK tests with JUnit XML
      - uses: actions/setup-go@v6
        if: matrix.sdk == 'go'
        with:
          go-version: '1.21'
          cache: false

      - name: Build Go native client artifacts
        if: matrix.sdk == 'go'
        run: ./zig/zig build clients:go

      - name: Run Go SDK tests
        if: matrix.sdk == 'go'
        run: |
          export CC="$PWD/zig/zig cc"
          cd src/clients/go
          go install github.com/jstemmer/go-junit-report/v2@latest
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 \
          go test ./... -v 2>&1 | go-junit-report > ../../../test-results/go.xml

      # Java SDK tests with JUnit XML
      - uses: actions/setup-java@v5
        if: matrix.sdk == 'java'
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Java SDK tests
        if: matrix.sdk == 'java'
        run: |
          cd src/clients/java
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 mvn test -Dsurefire.reportFormat=xml
          cp target/surefire-reports/*.xml ../../../test-results/ 2>/dev/null || echo "No Java results"

      # C SDK tests with JUnit XML
      - name: Run C SDK tests
        if: matrix.sdk == 'c'
        env:
          ARCHERDB_ADDRESS: ${{ steps.cluster.outputs.addresses || '127.0.0.1:3000' }}
          TEST_TAG: nightly
        run: |
          ./zig/zig build clients:c
          set +e
          (
            cd tests/sdk_tests/c
            ../../../zig/zig build test -Doptimize=ReleaseSafe
          )
          status=$?
          if [ "$status" -eq 0 ]; then
            cat > test-results/c.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="c-sdk" tests="1" failures="0"><testcase name="c-sdk-nightly" classname="c-sdk"/></testsuite></testsuites>
          EOF
          else
            cat > test-results/c.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="c-sdk" tests="1" failures="1"><testcase name="c-sdk-nightly" classname="c-sdk"><failure message="C SDK nightly tests failed">See workflow logs for details.</failure></testcase></testsuite></testsuites>
          EOF
          fi
          exit "$status"

      # Publish JUnit XML test results
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'test-results/*.xml'
          check_name: 'Nightly Tests (${{ matrix.sdk }}, ${{ matrix.node_count }} nodes)'
          fail_on_failure: true
          include_passed: true
          detailed_summary: true

      - name: Cleanup cluster
        if: always()
        run: |
          if [ -f cluster_pids.txt ]; then
            for pid in $(cat cluster_pids.txt | tr ',' ' '); do
              kill $pid 2>/dev/null || true
            done
          fi
          ./scripts/dev-cluster.sh stop 2>/dev/null || true

      # Upload test results artifact with SDK and node count
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-test-results-${{ matrix.sdk }}-${{ matrix.node_count }}nodes
          path: test-results/
          retention-days: 30

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-log-${{ matrix.sdk }}-${{ matrix.node_count }}nodes
          path: |
            server.log
            *.log

  benchmark-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build release
        run: ./zig/zig build -Drelease

      - name: Run benchmarks
        run: |
          ./zig-out/bin/archerdb benchmark \
            --event-count=100000 \
            --entity-count=10000 \
            --query-uuid-count=10000 \
            --query-radius-count=1000 \
            --query-polygon-count=1000 || echo "Benchmark completed"
