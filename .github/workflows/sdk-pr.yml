# SDK PR Tests - All 5 SDKs with JUnit XML reporting
# Strict 15 minute timeout per CI tier spec.
# Runs on pull requests to main.

name: SDK PR Tests
on:
  pull_request:
    branches: [main]

concurrency:
  group: sdk-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  pr-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Strict 15 min budget per CI tier spec
    strategy:
      fail-fast: true  # Fail fast per CONTEXT.md decision
      matrix:
        sdk: [python, nodejs, go, java, c]
    name: SDK PR (${{ matrix.sdk }})
    steps:
      - uses: actions/checkout@v6

      - name: Download Zig
        run: ./zig/download.sh

      - name: Build ArcherDB
        run: ./zig/zig build -j4

      - name: Start server
        run: |
          TMPDIR=$(mktemp -d)
          ./zig-out/bin/archerdb format --cluster=0 --replica=0 --replica-count=1 "$TMPDIR/test.archerdb"
          ./zig-out/bin/archerdb start --addresses=127.0.0.1:3000 --metrics-port=9100 --metrics-bind=127.0.0.1 "$TMPDIR/test.archerdb" > server.log 2>&1 &
          echo $! > server.pid
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:9100/health/ready >/dev/null 2>&1 && \
               grep -q 'listening on 127.0.0.1:3000' server.log; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 "$(cat server.pid)" 2>/dev/null; then
              echo "Server exited during startup"
              cat server.log || true
              exit 1
            fi
            sleep 1
          done
          if ! curl -sf http://127.0.0.1:9100/health/ready >/dev/null 2>&1 || \
             ! grep -q 'listening on 127.0.0.1:3000' server.log; then
            echo "Server did not become ready in time"
            tail -n 200 server.log || true
            exit 1
          fi

      - name: Create test-results directory
        run: mkdir -p test-results

      # Python: Full suite with JUnit XML
      - uses: actions/setup-python@v6
        if: matrix.sdk == 'python'
        with:
          python-version: '3.11'

      - name: Python full suite
        if: matrix.sdk == 'python'
        run: |
          pip install pytest
          cd src/clients/python
          export PYTHONPATH=src
          export ARCHERDB_INTEGRATION=1
          export ARCHERDB_ADDRESS=127.0.0.1:3000
          python -m pytest tests/ -v --timeout=60 \
            --junit-xml=../../../test-results/python.xml

      # Node.js: Full suite with JUnit XML
      - uses: actions/setup-node@v6
        if: matrix.sdk == 'nodejs'
        with:
          node-version: '20'

      - name: Node.js full suite
        if: matrix.sdk == 'nodejs'
        run: |
          cd src/clients/node
          npm install
          npm install --save-dev jest-junit
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 \
          JEST_JUNIT_OUTPUT_DIR="../../test-results" \
          JEST_JUNIT_OUTPUT_NAME="nodejs.xml" \
          npm test -- --reporter=jest-junit

      # Go: Full suite with JUnit XML
      - uses: actions/setup-go@v6
        if: matrix.sdk == 'go'
        with:
          go-version: '1.21'
          cache: false

      - name: Build Go native client artifacts
        if: matrix.sdk == 'go'
        run: ./zig/zig build clients:go

      - name: Go full suite
        if: matrix.sdk == 'go'
        run: |
          export CC="$PWD/zig/zig cc"
          cd src/clients/go
          go install github.com/jstemmer/go-junit-report/v2@latest
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 \
          go test ./... -v -timeout 60s 2>&1 | go-junit-report > ../../../test-results/go.xml

      # Java: Full suite with JUnit XML
      - uses: actions/setup-java@v5
        if: matrix.sdk == 'java'
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Java full suite
        if: matrix.sdk == 'java'
        run: |
          cd src/clients/java
          ARCHERDB_HOST=127.0.0.1 ARCHERDB_PORT=3000 mvn test -Dsurefire.reportFormat=xml
          cp target/surefire-reports/*.xml ../../../test-results/ 2>/dev/null || echo "No Java results"

      # C: Full suite with JUnit XML
      - name: C full suite
        if: matrix.sdk == 'c'
        env:
          ARCHERDB_ADDRESS: 127.0.0.1:3000
          TEST_TAG: pr
        run: |
          ./zig/zig build clients:c
          set +e
          (
            cd tests/sdk_tests/c
            ../../../zig/zig build test -Doptimize=ReleaseSafe
          )
          status=$?
          if [ "$status" -eq 0 ]; then
            cat > test-results/c.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="c-sdk" tests="1" failures="0"><testcase name="c-sdk-pr" classname="c-sdk"/></testsuite></testsuites>
          EOF
          else
            cat > test-results/c.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="c-sdk" tests="1" failures="1"><testcase name="c-sdk-pr" classname="c-sdk"><failure message="C SDK PR tests failed">See workflow logs for details.</failure></testcase></testsuite></testsuites>
          EOF
          fi
          exit "$status"

      # Publish JUnit XML test results
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'test-results/*.xml'
          check_name: 'SDK Tests (${{ matrix.sdk }})'
          fail_on_failure: true
          include_passed: true
          detailed_summary: true

      # Upload test results artifact
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.sdk }}
          path: test-results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: kill $(cat server.pid) 2>/dev/null || true

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-log-${{ matrix.sdk }}
          path: server.log
