#
# Java Central Rehearsal — exercises the Java publish prerequisites and artifact
# build against the current commit without pushing to production Maven Central.
#
# What this verifies:
#   1. All Java publish preflight prerequisites are in place (MAVEN_USERNAME,
#      MAVEN_CENTRAL_TOKEN, MAVEN_GPG_PASSPHRASE, gpg secret key, mvn, java).
#   2. The Java dist artifacts (jar, sources.jar, javadoc.jar, pom.xml) build
#      cleanly from the current commit via `zig build scripts -- release
#      --language=java --build`.
#   3. The produced artifacts are staged under zig-out/dist/java with stable
#      checksums, and the checksums match a second invocation on the same
#      source tree (rebuild determinism check).
#
# What this does NOT do:
#   - It does not upload to Sonatype / Maven Central. The release script's
#     publish path currently targets production Central unconditionally
#     (see src/scripts/release.zig, curl to central.sonatype.com). Until the
#     release script exposes an explicit staging-base-url override for the
#     upload endpoint (not just the polling endpoint), a full end-to-end
#     staging rehearsal is out of scope for this workflow.
#
# Triggers: manual dispatch and a weekly schedule. Per-PR runs are intentionally
# avoided because the prerequisites include real secrets.
#
# Required secrets (declare in repo settings; workflow fails closed if absent):
#   - MAVEN_USERNAME
#   - MAVEN_CENTRAL_TOKEN
#   - MAVEN_GPG_PASSPHRASE
#   - MAVEN_GPG_SECRET_KEY   (ASCII-armored private key, used to import into gpg)

name: Java Central Rehearsal

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to rehearse (defaults to HEAD of the workflow branch)'
        required: false
        default: ''
  schedule:
    # Sundays at 07:00 UTC
    - cron: '0 7 * * 0'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  rehearsal:
    name: Java Central publish rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.sha || github.sha }}
          fetch-depth: 0

      - name: Refuse to run without required secrets
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_GPG_SECRET_KEY: ${{ secrets.MAVEN_GPG_SECRET_KEY }}
        run: |
          missing=0
          [ -n "$MAVEN_USERNAME" ] || { echo "MAVEN_USERNAME not set"; missing=1; }
          [ -n "$MAVEN_CENTRAL_TOKEN" ] || { echo "MAVEN_CENTRAL_TOKEN not set"; missing=1; }
          [ -n "$MAVEN_GPG_PASSPHRASE" ] || { echo "MAVEN_GPG_PASSPHRASE not set"; missing=1; }
          [ -n "$MAVEN_GPG_SECRET_KEY" ] || { echo "MAVEN_GPG_SECRET_KEY not set"; missing=1; }
          if [ "$missing" = "1" ]; then
            echo "One or more required secrets are missing; failing closed."
            exit 1
          fi
          echo "All required secrets present."

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download Zig
        run: ./zig/download.sh && ./zig/zig version

      - name: Import GPG signing key
        env:
          MAVEN_GPG_SECRET_KEY: ${{ secrets.MAVEN_GPG_SECRET_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          echo "$MAVEN_GPG_SECRET_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Preflight (validate publish prerequisites, no network upload)
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          SHA="${{ github.event.inputs.sha || github.sha }}"
          ./zig/zig build scripts -- release \
            --language=java \
            --build \
            --publish \
            --preflight \
            --sha="$SHA"

      - name: Build Java dist artifacts (first pass)
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          SHA="${{ github.event.inputs.sha || github.sha }}"
          ./zig/zig build scripts -- release \
            --language=java \
            --build \
            --no-changelog \
            --sha="$SHA"
          ls -la zig-out/dist/java/

      - name: Record first-pass checksums
        run: |
          cd zig-out/dist/java
          sha256sum * | sort > ../../../rehearsal-pass1.sha256
          cat ../../../rehearsal-pass1.sha256

      - name: Rebuild Java dist artifacts (second pass)
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          rm -rf zig-out/dist/java
          SHA="${{ github.event.inputs.sha || github.sha }}"
          ./zig/zig build scripts -- release \
            --language=java \
            --build \
            --no-changelog \
            --sha="$SHA"

      - name: Record second-pass checksums and diff
        run: |
          cd zig-out/dist/java
          sha256sum * | sort > ../../../rehearsal-pass2.sha256
          cd ../../..
          # Signed artifacts include a timestamp, so we only require .jar / .pom
          # checksums to match across passes. Signature files (.asc) and
          # checksum-of-signature files are allowed to drift.
          grep -E '\.(jar|pom)$' rehearsal-pass1.sha256 > rehearsal-pass1.core.sha256
          grep -E '\.(jar|pom)$' rehearsal-pass2.sha256 > rehearsal-pass2.core.sha256
          if ! diff -u rehearsal-pass1.core.sha256 rehearsal-pass2.core.sha256; then
            echo "Non-determinism detected in core artifacts across rebuilds."
            exit 1
          fi
          echo "Core artifacts (jar/pom) are byte-identical across rebuilds."

      - name: Verify GPG signatures on produced artifacts
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          cd zig-out/dist/java
          for asc in *.asc; do
            target="${asc%.asc}"
            if [ ! -f "$target" ]; then
              echo "Signature $asc has no matching target file; failing."
              exit 1
            fi
            gpg --verify "$asc" "$target"
          done

      - name: Upload rehearsal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-central-rehearsal-${{ github.run_id }}
          path: |
            zig-out/dist/java/
            rehearsal-pass1.sha256
            rehearsal-pass2.sha256
          retention-days: 14
